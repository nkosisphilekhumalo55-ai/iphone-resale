<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <h1>Neo Store</h1>
    <p>Modern Apple-style experience</p>
  </header>

  <section class="grid">

    <div class="card">
      <img src="iphone14.jpg" alt="iPhone 14">
      <h2>iPhone 14</h2>
      <p>R12,999</p>
      <button>Buy</button>
    </div>

    <div class="card">
      <img src="iphone15.jpg" alt="iPhone 15">
      <h2>iPhone 15</h2>
      <p>R18,999</p>
      <button>Buy</button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
