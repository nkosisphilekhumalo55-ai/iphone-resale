<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Neo</h2>
    <a href="#">🏠 Home</a>
    <a href="#">📱 Products</a>
    <a href="#">🔥 Deals</a>
    <a href="#">📸 Upload</a>
  </aside>

  <!-- Main content -->
  <main class="main">

    <header class="header">
      <h1>Discover Devices</h1>
      <p>Apple-style dark glass experience</p>
    </header>

    <!-- Upload -->
    <div class="upload">
      <input type="file" accept="image/*" capture="environment" id="cameraInput">
      <img id="preview">
    </div>

    <!-- Products -->
    <section class="grid">

      <div class="card">
        <img src="iphone14.jpg">
        <h3>iPhone 14</h3>
        <p>R12,999</p>
        <button>Buy</button>
      </div>

      <div class="card">
        <img src="iphone15.jpg">
        <h3>iPhone 15</h3>
        <p>R18,999</p>
        <button>Buy</button>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
