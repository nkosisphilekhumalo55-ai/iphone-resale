<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div><b>MyStore</b></div>
    <nav>
        <a href="index.html">Home</a>
    </nav>
</header>

<div class="hero">
    <h1>Your Cart</h1>
    <div id="cart-items"></div>

    <h2 id="total"></h2>

    <a class="btn" onclick="checkoutWhatsApp()">Checkout on WhatsApp</a>
</div>

<script src="cart.js"></script>

<script>
loadCart();

function renderCart() {
    let container = document.getElementById("cart-items");
    let total = 0;

    container.innerHTML = "";

    cart.forEach(item => {
        total += item.price;
        container.innerHTML += "<p>" + item.product + " - R" + item.price + "</p>";
    });

    document.getElementById("total").innerText = "Total: R" + total;
}

function checkoutWhatsApp() {
    let message = "Hello, I want to buy:%0A";
    let total = 0;

    cart.forEach(item => {
        message += "- " + item.product + " R" + item.price + "%0A";
        total += item.price;
    });

    message += "%0ATotal: R" + total;

    window.location.href =
    "https://wa.me/27706418906?text=" + message;
}

renderCart();
</script>

</body>
</html>
